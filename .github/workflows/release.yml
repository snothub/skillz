name: Release

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    # Uncomment when test script is added to package.json
    # - name: Test
    #   run: npm test

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Setup SSH for Helm repo
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.HELM_DEPLOY_KEY }}

    - name: Update image tag in values.yaml
      env:
        TAG: ${{ github.ref_name }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git clone git@github.com:fortedigital/helm-values.git helm
        cd helm
        git fetch origin main
        git checkout main
        # Remove 'v' prefix from tag to match docker image tags (e.g., v1.1.1 -> 1.1.1)
        TAG_WITHOUT_V="${TAG#v}"
        sed -i "s|tag: .*|tag: ${TAG_WITHOUT_V}|" mcpcoder/values.yaml
        git add mcpcoder/values.yaml
        git commit -m "chore: update image tag to ${TAG_WITHOUT_V}"
        git push origin main
