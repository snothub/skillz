name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Uncomment when test script is added to package.json
      # - name: Test
      #   run: npm test

      # Uncomment when lint script is added to package.json
      # - name: Lint
      #   run: npm run lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t mcpcoder:ci .
