apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcpcoder.authFullname" . }}
  labels:
    {{- include "mcpcoder.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mcpcoder.authSelectorLabels" . | nindent 4 }}
