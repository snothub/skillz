apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcpcoder.fullname" . }}
  labels:
    {{- include "mcpcoder.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mcpcoder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mcpcoder.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.nodeEnv | quote }}
            - name: SKILLS_DIR
              value: {{ .Values.skills.dir | quote }}
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
